<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talking Stage Chat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.chat-container {
    max-width: 420px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #efeae2;
    border-radius: 12px;
    overflow: hidden;
}

.header {
    background: linear-gradient(90deg, #075e54, #128c7e);
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin: 8px 0;
    max-width: 75%;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1;}
}

.bot {
    background: white;
    align-self: flex-start;
}

.user {
    background: #dcf8c6;
    align-self: flex-end;
}

.typing {
    font-style: italic;
    font-size: 12px;
    opacity: 0.7;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
    align-items: center;
    gap: 6px;
}

input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: #075e54;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* Paperclip upload button styling */
#uploadBtn {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 10px;
    background: #128c7e;
    border-radius: 50%;
    font-size: 18px;
    color: white;
    cursor: pointer;
}
#avatarInput {
    display: none;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">
        <img id="userAvatar" src="https://i.pinimg.com/736x/58/76/01/587601c5f2994d9222065d40e6c6dc02.jpg" />
        <div id="chatTitle">Talking Stage</div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your answer...">
        <!-- Paperclip Upload -->
        <label id="uploadBtn" for="avatarInput">📎</label>
        <input type="file" id="avatarInput" accept="image/*">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const { jsPDF } = window.jspdf;

const questions = [
    () => "Hey... before we get lost in vibes, what's your name?",
    (n) => `Nice to meet you, ${n}. Where are you from?`,
    (n) => `What are you looking for right now?`,
    (n) => `Tell me ${n}, what does a normal day look like?`,
    (n) => `What are you focused on these days?`,
    (n) => `What are your non-negotiables?`,
    (n) => `What does respect mean to you?`,
    (n) => `Be honest ${n}... what’s your biggest red flag?`,
    (n) => `What do you enjoy doing?`,
    (n) => `Indoors or outdoors?`,
    (n) => `How do you communicate?`,
    (n) => `When things get messy, how do you handle conflict?`,
    (n) => `What does a healthy relationship look like to you?`,
    (n) => `Are you emotionally available right now?`,
    (n) => `What do you expect from your partner?`,
    (n) => `What’s your ideal date like?`,
    (n) => `What makes you genuinely happy, ${n}?`,
    (n) => `What are you healing from?`,
    (n) => `Finally... what should love feel like for you?`
];

let answers = [];
let currentQuestion = 0;
let userName = "";
let avatarDataURL = "";

const chatBox = document.getElementById("chatBox");

function addMessage(text, sender, isTyping=false) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    if(isTyping) msg.classList.add("typing");
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
}

function askQuestion() {
    if (currentQuestion < questions.length) {
        const typing = addMessage("typing...", "bot", true);

        setTimeout(() => {
            typing.remove();
            let text = currentQuestion === 0 ? questions[0]() : questions[currentQuestion](userName);
            addMessage(text, "bot");
        }, 800);
    } else {
        finishChat();
    }
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    answers.push(text);

    if(currentQuestion === 0){
        userName = text;
        document.getElementById("chatTitle").innerText = `${userName}'s Talking Stage`;
    }

    input.value = "";
    currentQuestion++;
    setTimeout(askQuestion, 600);
}

function uploadAvatar() {
    const input = document.getElementById("avatarInput");
    if(input.files && input.files[0]){
        const reader = new FileReader();
        reader.onload = function(e){
            avatarDataURL = e.target.result;
            document.getElementById("userAvatar").src = avatarDataURL;
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function finishChat() {
    addMessage(`That felt real, ${userName}. Let me wrap this into something beautiful... 📄`, "bot");

    let content = `Talking Stage Responses\n\nName: ${userName}\n\n`;

    questions.forEach((q, i) => {
        let questionText = i === 0 ? q() : q(userName);
        content += `${i+1}. ${questionText}\n`;
        content += `Answer: ${answers[i] || ""}\n\n`;
    });

    generatePDF(content);
    sendToWhatsApp();
}

function generatePDF(text) {
    const doc = new jsPDF();
    if(avatarDataURL){
        doc.addImage(avatarDataURL, 'JPEG', 10, 10, 30, 30);
        doc.text(text, 10, 50);
    } else {
        doc.text(text, 10, 10);
    }
    doc.save(`${userName}_Talking_Stage.pdf`);
}

function sendToWhatsApp() {
    const msg = `Hey, it's ${userName}. I've completed the talking stage questions. Sending my responses now.`;
    const url = `https://wa.me/254783845747?text=${encodeURIComponent(msg)}`;
    setTimeout(() => {
        window.open(url, "_blank");
    }, 1500);
}

// Event listener for paperclip
document.getElementById("avatarInput").addEventListener("change", uploadAvatar);

// start chat
askQuestion();
</script>

</body>
</html>
