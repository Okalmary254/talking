<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Talking Stage · WhatsApp Style</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --wa-green: #00a884;
  --wa-green-dark: #008069;
  --wa-green-light: #d9fdd3;
  --wa-bg: #efeae2;
  --wa-header: #202c33;
  --wa-header2: #2a3942;
  --wa-bubble-in: #ffffff;
  --wa-bubble-out: #d9fdd3;
  --wa-text: #111b21;
  --wa-text-secondary: #667781;
  --wa-input-bg: #ffffff;
  --wa-divider: #e9edef;
  --wa-tick: #53bdeb;
  --wa-shadow: rgba(11, 20, 26, 0.13);
}

html, body {
  height: 100%;
  background: #0b141a;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
  touch-action: pan-y pinch-zoom;
}

/* Mobile-first: full bleed with safe areas */
.wa-wallpaper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: var(--wa-bg);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8bfb0' fill-opacity='0.25'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  background-repeat: repeat;
  z-index: 0;
}

/* Phone container — perfect for mobile */
.phone {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  max-width: 100%;
  background: var(--wa-bg);
  overflow: hidden;
  box-shadow: none;
  border-radius: 0;
}

/* ===== HEADER (compact & touch-friendly) ===== */
.wa-header {
  background: var(--wa-header);
  padding: 0 8px 0 4px;
  display: flex;
  align-items: center;
  height: 60px;
  flex-shrink: 0;
  gap: 6px;
  position: relative;
  z-index: 10;
  backdrop-filter: blur(0px);
}

.back-btn {
  color: #e9edef;
  font-size: 28px;
  font-weight: 500;
  padding: 6px 8px;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
  border-radius: 50%;
  transition: background 0.1s;
}
.back-btn:active { background: rgba(255,255,255,0.1); }

.header-avatar-wrap {
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
}
.header-avatar-wrap:active .av-edit { opacity: 0.8; }
.av-edit {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.15s;
  color: white;
}
#headerAvatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  background: #2a3942;
}

.header-info {
  flex: 1;
  overflow: hidden;
  cursor: pointer;
  padding: 4px 0;
}
.header-name {
  font-size: 16px;
  font-weight: 600;
  color: #e9edef;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.header-status {
  font-size: 12px;
  color: #8696a0;
  line-height: 1.3;
}

.header-icons {
  display: flex;
  gap: 2px;
  align-items: center;
  flex-shrink: 0;
}
.hico {
  color: #aebac1;
  font-size: 20px;
  padding: 8px;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hico:active { background: rgba(255,255,255,0.12); }
.hico i { font-size: 20px; }

/* progress thin line */
.progress-bar-wrap {
  height: 3px;
  background: rgba(0,0,0,0.2);
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: var(--wa-green);
  transition: width 0.3s ease;
  width: 0%;
}

/* CHAT SCROLL — main area */
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  scroll-behavior: smooth;
  padding: 0 0 4px 0;
}
.chat-scroll::-webkit-scrollbar { width: 4px; }
.chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 10px; }

.chat-area {
  position: relative;
  min-height: 100%;
  padding: 8px 6px 12px 6px;
  display: flex;
  flex-direction: column;
}

/* date pill */
.date-pill {
  display: flex;
  justify-content: center;
  margin: 6px 0 10px;
}
.date-pill span {
  background: #fff8e1;
  color: #54656f;
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}

/* system encryption */
.sys-notice {
  display: flex;
  justify-content: center;
  margin: 4px 12px 12px;
}
.sys-notice span {
  background: #fff8e1;
  color: #54656f;
  font-size: 10.5px;
  text-align: center;
  padding: 6px 12px;
  border-radius: 16px;
  line-height: 1.4;
  max-width: 85%;
}
.lock-icon { font-size: 10px; margin-right: 3px; }

/* MESSAGE WRAPPER */
.msg-wrap {
  display: flex;
  padding: 2px 8px;
  align-items: flex-end;
  gap: 5px;
  margin: 2px 0;
}
.msg-wrap.incoming { justify-content: flex-start; }
.msg-wrap.outgoing { justify-content: flex-end; }

/* small avatar */
.msg-av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  margin-bottom: 4px;
  align-self: flex-end;
}
.msg-wrap.outgoing .msg-av { display: none; }

/* BUBBLES — modern whatsapp style with smooth borders */
.bubble {
  max-width: 82%;
  min-width: 50px;
  padding: 8px 9px 7px 10px;
  border-radius: 18px;
  font-size: 14.5px;
  line-height: 19.5px;
  color: var(--wa-text);
  position: relative;
  word-wrap: break-word;
  box-shadow: 0 1px 0.8px rgba(0,0,0,0.08);
}

.bubble.incoming {
  background: var(--wa-bubble-in);
  border-top-left-radius: 4px;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
  border-top-right-radius: 18px;
}

.bubble.outgoing {
  background: var(--wa-bubble-out);
  border-top-right-radius: 4px;
  border-top-left-radius: 18px;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
}

/* timestamp + ticks row */
.meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
  margin-top: 4px;
  margin-left: 8px;
  float: right;
}
.meta .time {
  font-size: 10px;
  color: var(--wa-text-secondary);
  line-height: 14px;
  white-space: nowrap;
}
.bubble.outgoing .meta .time { color: #667781; }
.ticks {
  color: var(--wa-tick);
  font-size: 12px;
  line-height: 14px;
  letter-spacing: -1px;
}

/* Typing indicator */
.typing-bubble {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  width: 58px;
  background: var(--wa-bubble-in);
  border-radius: 18px;
  border-top-left-radius: 4px;
}
.typing-bubble .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #8696a0;
  animation: wa-bounce 1.3s infinite ease-in-out;
}
.typing-bubble .dot:nth-child(1) { animation-delay: 0s; }
.typing-bubble .dot:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes wa-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* incoming animation */
.msg-wrap {
  animation: fadeSlideUp 0.2s ease-out;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* final notice */
.final-notice {
  display: flex;
  justify-content: center;
  margin: 14px 12px 8px;
}
.final-notice span {
  background: #dcf8c6;
  color: #1a6b40;
  font-size: 11.5px;
  text-align: center;
  padding: 10px 14px;
  border-radius: 20px;
  line-height: 1.45;
  font-weight: 500;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

/* ===== INPUT AREA (mobile sticky) ===== */
.wa-input-area {
  background: var(--wa-header);
  padding: 6px 8px 8px 8px;
  display: flex;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
  border-top: 0.5px solid rgba(255,255,255,0.05);
}

.emoji-btn, .attach-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  color: #aebac1;
  font-size: 24px;
  line-height: 1;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.emoji-btn:active, .attach-btn:active { background: rgba(255,255,255,0.1); }

.input-pill {
  flex: 1;
  background: #2a3942;
  border-radius: 24px;
  display: flex;
  align-items: center;
  padding: 4px 12px;
  min-height: 42px;
  gap: 6px;
}

#userInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 15px;
  color: #e9edef;
  line-height: 20px;
  resize: none;
  max-height: 90px;
  overflow-y: auto;
  padding: 8px 0;
  margin: 0;
}
#userInput::placeholder { color: #8696a0; }
#userInput::-webkit-scrollbar { width: 2px; }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--wa-green);
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.05s;
  margin-left: 2px;
}
.send-btn:active { transform: scale(0.94); background: #00917a; }
.send-btn svg { width: 20px; height: 20px; stroke-width: 2; }

#avatarInput { display: none; }

/* Extra small devices (<= 420px) fine-tuning */
@media (max-width: 480px) {
  .bubble {
    max-width: 85%;
    font-size: 14px;
    padding: 7px 9px 6px 10px;
  }
  .header-name { font-size: 15px; }
  .header-status { font-size: 11px; }
  .hico i, .hico { font-size: 19px; }
  #headerAvatar { width: 38px; height: 38px; }
  .msg-av { width: 26px; height: 26px; }
  .wa-header { height: 58px; padding: 0 5px 0 2px; }
  .input-pill { min-height: 40px; }
  .send-btn { width: 42px; height: 42px; }
  .emoji-btn, .attach-btn { font-size: 22px; padding: 6px; }
}

/* iPhone SE / small foldable */
@media (max-width: 380px) {
  .bubble { max-width: 88%; font-size: 13.5px; }
  .meta .time { font-size: 9px; }
  .header-name { font-size: 14px; }
  .header-icons .hico { padding: 6px; }
  .input-pill { padding: 2px 10px; }
}
</style>
</head>
<body>

<div class="wa-wallpaper"></div>

<div class="phone">
  <!-- Header -->
  <div class="wa-header">
    <div class="back-btn" onclick="history.back()" aria-label="Back">‹</div>
    <div class="header-avatar-wrap" onclick="document.getElementById('avatarInput').click()" title="Change profile photo">
      <img id="headerAvatar" src="https://i.pinimg.com/736x/58/76/01/587601c5f2994d9222065d40e6c6dc02.jpg" alt="avatar">
      <div class="av-edit">✏️</div>
    </div>
    <input type="file" id="avatarInput" accept="image/*">
    <div class="header-info" onclick="document.getElementById('avatarInput').click()">
      <div class="header-name" id="headerName">Talking Stage 💬</div>
      <div class="header-status" id="headerStatus">online</div>
    </div>
    <div class="header-icons">
      <span class="hico"><i class="fas fa-video"></i></span>
      <span class="hico"><i class="fas fa-phone"></i></span>
      <span class="hico"><i class="fas fa-ellipsis-v"></i></span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <!-- Chat scrollable area -->
  <div class="chat-scroll" id="chatScroll">
    <div class="chat-area" id="chatArea">
      <div class="date-pill"><span>TODAY</span></div>
      <div class="sys-notice">
        <span><span class="lock-icon">🔒</span> Messages are end-to-end encrypted. No one outside can read them.</span>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="wa-input-area">
    <button class="emoji-btn" aria-label="Emoji">😊</button>
    <div class="input-pill">
      <button class="attach-btn" onclick="document.getElementById('avatarInput').click()" aria-label="Attach">📎</button>
      <textarea id="userInput" rows="1" placeholder="Message" autocomplete="off" autocorrect="on" spellcheck="true"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

// Questions array
const questions = [
  () => "Hey 👋 Before we get into it — what's your name?",
  (n) => `Nice to meet you, ${n} 😊 Where are you from?`,
  (n) => `So ${n}... what are you actually looking for right now? Be honest.`,
  (n) => `Walk me through a normal day in your life.`,
  (n) => `What are you most focused on building right now?`,
  (n) => `What are your non-negotiables in a relationship?`,
  (n) => `What does respect look like to you?`,
  (n) => `Real talk ${n} — what's your biggest red flag? 😅`,
  (n) => `What do you enjoy doing for fun?`,
  (n) => `Indoors or outdoors? And why?`,
  (n) => `How do you usually communicate when something's bothering you?`,
  (n) => `When things get messy, how do you handle conflict?`,
  (n) => `What does a healthy relationship look like to you?`,
  (n) => `Are you emotionally available right now? Like really? 🤔`,
  (n) => `What are you expecting from a partner?`,
  (n) => `Describe your ideal date. Don't hold back 😏`,
  (n) => `What makes you genuinely happy, ${n}?`,
  (n) => `What are you still healing from?`,
  (n) => `Last one — what should love actually feel like for you? 💛`
];

let answers = [];
let currentQ = 0;
let userName = "";
let avatarDataURL = "";
let isWaiting = false;

const chatArea = document.getElementById("chatArea");
const chatScroll = document.getElementById("chatScroll");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function nowTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function scrollToBottom() {
  setTimeout(() => {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }, 40);
}

function updateProgress() {
  const pct = (currentQ / questions.length) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  if (userName) {
    document.getElementById("headerStatus").textContent = `${currentQ} of ${questions.length} answered`;
  }
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/\n/g, '<br>');
}

// Incoming message with typing indicator
async function addIncoming(text) {
  return new Promise(resolve => {
    // typing indicator
    const typingWrap = document.createElement("div");
    typingWrap.className = "msg-wrap incoming";
    const av = document.createElement("img");
    av.className = "msg-av";
    av.src = document.getElementById("headerAvatar").src;
    const typingBubble = document.createElement("div");
    typingBubble.className = "bubble incoming typing-bubble";
    typingBubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    typingWrap.appendChild(av);
    typingWrap.appendChild(typingBubble);
    chatArea.appendChild(typingWrap);
    scrollToBottom();

    const delay = 700 + Math.min(text.length * 15, 800);
    setTimeout(() => {
      typingWrap.remove();

      const wrap = document.createElement("div");
      wrap.className = "msg-wrap incoming";
      const av2 = document.createElement("img");
      av2.className = "msg-av";
      av2.src = document.getElementById("headerAvatar").src;
      const bubble = document.createElement("div");
      bubble.className = "bubble incoming";
      bubble.innerHTML = `${escapeHtml(text)}<div class="meta"><span class="time">${nowTime()}</span></div>`;
      wrap.appendChild(av2);
      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addOutgoing(text) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap outgoing";
  const bubble = document.createElement("div");
  bubble.className = "bubble outgoing";
  bubble.innerHTML = `${escapeHtml(text)}<div class="meta"><span class="time">${nowTime()}</span><span class="ticks">✓✓</span></div>`;
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollToBottom();
}

async function askQuestion() {
  if (currentQ < questions.length) {
    isWaiting = true;
    sendBtn.disabled = true;
    document.getElementById("headerStatus").textContent = "typing...";
    const qText = currentQ === 0 ? questions[0]() : questions[currentQ](userName);
    await addIncoming(qText);
    document.getElementById("headerStatus").textContent = userName ? `${currentQ} of ${questions.length} answered` : "online";
    isWaiting = false;
    sendBtn.disabled = false;
    userInput.focus();
    userInput.scrollIntoView({ behavior: "smooth", block: "nearest" });
  } else {
    await finishChat();
  }
}

async function sendMessage() {
  if (isWaiting) return;
  const rawText = userInput.value.trim();
  if (!rawText) return;

  addOutgoing(rawText);
  answers.push(rawText);
  userInput.value = "";
  autoResize();

  if (currentQ === 0) {
    userName = rawText.split(" ")[0];
    document.getElementById("headerName").textContent = `${userName} 💬`;
  }
  currentQ++;
  updateProgress();
  setTimeout(askQuestion, 480);
}

function autoResize() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 90) + 'px';
}
userInput.addEventListener('input', autoResize);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Avatar upload & live update
document.getElementById("avatarInput").addEventListener("change", function(e) {
  if (this.files && this.files[0]) {
    const reader = new FileReader();
    reader.onload = ev => {
      avatarDataURL = ev.target.result;
      document.getElementById("headerAvatar").src = avatarDataURL;
      document.querySelectorAll(".msg-av").forEach(img => img.src = avatarDataURL);
    };
    reader.readAsDataURL(this.files[0]);
  }
});

// PDF generator
function generatePDF() {
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pw = doc.internal.pageSize.getWidth();
  const ml = 36, mr = 36;
  let y = 0;
  
  doc.setFillColor(32, 44, 51);
  doc.rect(0, 0, pw, 78, 'F');
  const avatarSrc = avatarDataURL || document.getElementById("headerAvatar").src;
  if (avatarSrc && avatarSrc !== "https://i.pinimg.com/736x/58/76/01/587601c5f2994d9222065d40e6c6dc02.jpg") {
    try { doc.addImage(avatarSrc, 'JPEG', ml, 16, 48, 48, undefined, 'FAST'); } catch(e) {}
  } else {
    doc.setFillColor(0, 168, 132);
    doc.circle(ml + 24, 40, 24, 'F');
    doc.setFontSize(22);
    doc.setTextColor(255,255,255);
    doc.text((userName?.[0] || "?").toUpperCase(), ml+24, 46, { align: 'center' });
  }
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(19);
  doc.setTextColor(233,237,239);
  doc.text("Talking Stage", ml+62, 36);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.setTextColor(134,150,160);
  const dateStr = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  doc.text(`${userName || "Friend"} · ${dateStr}`, ml+62, 56);
  doc.setFontSize(9);
  doc.text("🔒  End-to-end encrypted", pw - mr, 68, { align: 'right' });
  y = 98;
  
  for (let i = 0; i < questions.length; i++) {
    const qText = i === 0 ? questions[0]() : questions[i](userName);
    const aText = answers[i] || "(Not answered yet)";
    const aLines = doc.splitTextToSize(aText, pw - ml - mr - 24);
    const bubbleH = Math.max(30, aLines.length * 15 + 18);
    if (y + bubbleH + 40 > doc.internal.pageSize.getHeight() - 40) {
      doc.addPage();
      y = 28;
    }
    doc.setFillColor(0, 168, 132);
    doc.roundedRect(ml, y, 26, 18, 4, 4, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(255,255,255);
    doc.text(`Q${i+1}`, ml+13, y+13, { align: 'center' });
    doc.setFont('helvetica', 'bolditalic');
    doc.setFontSize(11);
    doc.setTextColor(32,44,51);
    const qLines = doc.splitTextToSize(qText.replace(/[^\x00-\x7F]/g, ''), pw - ml - mr - 42);
    doc.text(qLines, ml+34, y+12);
    y += Math.max(26, qLines.length * 14) + 5;
    doc.setFillColor(217, 253, 211);
    doc.roundedRect(ml+8, y, pw - ml - mr - 16, bubbleH, 8, 8, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11.5);
    doc.setTextColor(17,27,33);
    doc.text(aLines, ml+16, y+12);
    doc.setFontSize(8);
    doc.setTextColor(102,119,129);
    doc.text(nowTime() + '  ✓✓', ml + (pw - ml - mr - 24), y + bubbleH - 7, { align: 'right' });
    y += bubbleH + 16;
    if (i < questions.length-1) {
      doc.setDrawColor(233,237,239);
      doc.line(ml, y-8, pw-mr, y-8);
    }
  }
  doc.save(`${userName || "Talking"}_Stage_Responses.pdf`);
}

async function finishChat() {
  isWaiting = true;
  sendBtn.disabled = true;
  userInput.disabled = true;
  userInput.placeholder = "Chat completed ✅";
  
  generatePDF();
  await addIncoming(`Amazing, ${userName}! You've answered all ${questions.length} questions 🎉`);
  await new Promise(r => setTimeout(r, 700));
  await addIncoming("Your responses have been compiled into a PDF and it's downloading now 📄");
  await new Promise(r => setTimeout(r, 800));
  await addIncoming("Please **open WhatsApp**, find the number, and send the PDF file as an attachment 📎 You'll find it in your Downloads folder.");
  
  const noticeDiv = document.createElement("div");
  noticeDiv.className = "final-notice";
  noticeDiv.innerHTML = `<span>📎 PDF saved to Downloads folder.<br>Open WhatsApp & send as <strong>attachment</strong> to complete Talking Stage.</span>`;
  chatArea.appendChild(noticeDiv);
  scrollToBottom();
  
  setTimeout(() => {
    const msg = `Hey! I'm ${userName}. I've completed the Talking Stage questions. I'm sending my full responses as a PDF attachment now 📎`;
    window.open(`https://wa.me/254783845747?text=${encodeURIComponent(msg)}`, "_blank");
  }, 2000);
}

// start conversation
askQuestion();
</script>
